[build]
  publish = "public"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

  # Daily data pull at 12:01am SGT (4:01pm UTC previous day)
  [functions.daily-pull]
    schedule = "1 16 * * *"

  # Weekly Monday briefing at 7:30am SGT (11:30pm UTC Sunday)
  [functions.weekly-summary]
    schedule = "30 23 * * 0"

  # Weekly GHL leads pull at 7:00am SGT Monday (11:00pm UTC Sunday) — runs before weekly summary
  [functions.ghl-leads-pull]
    schedule = "0 23 * * 0"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "ALLOWALL"
    Access-Control-Allow-Origin = "*"
