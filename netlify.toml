[build]
  publish = "public"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

  # Daily data pull at 7:00am SGT (11:00pm UTC previous day)
  [functions.daily-pull]
    schedule = "0 23 * * *"

  # Daily Telegram briefing at 7:30am SGT (11:30pm UTC previous day)
  [functions.daily-insight]
    schedule = "30 23 * * *"

  # Weekly Tuesday summary at 8:00am SGT (0:00am UTC Tuesday)
  [functions.weekly-summary]
    schedule = "0 0 * * 2"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "ALLOWALL"
    Access-Control-Allow-Origin = "*"
